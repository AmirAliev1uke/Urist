services:
  # ---------- База данных: PostgreSQL (метаданные, анализы, юзеры) ----------
  db:
    image: postgres:16-alpine
    container_name: legal_ai_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legal_password}
      POSTGRES_DB: ${POSTGRES_DB:-legal_ai}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/app/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legal} -d ${POSTGRES_DB:-legal_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Векторная БД: Qdrant (векторы + тексты чанков) ----------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal_ai_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------- Backend: FastAPI ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal_ai_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      GIGACHAT_API_KEY: ${GIGACHAT_API_KEY:-}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      LLM_PROXY: ${LLM_PROXY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      RAG_MIN_SIMILARITY: ${RAG_MIN_SIMILARITY:-0.3}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      PROMPT_LOG_DIR: ${PROMPT_LOG_DIR:-logs}
      PROMPT_LOG_ENABLED: ${PROMPT_LOG_ENABLED:-true}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-legal_chunks}
    ports:
      - "8000:8000"
    volumes:
      # Монтируем код для hot-reload при разработке
      - ./backend:/app
      # Логи промтов доступны с хоста в ./backend/logs/
      - ./backend/logs:/app/logs
      # Файлы надстройки Word для раздачи через /addin
      - ./word-addin:/app/word-addin:ro
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ---------- Frontend: React (Vite dev server) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: legal_ai_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
